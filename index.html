<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Global Website Ranking</title>
  <meta name="description" content="Browse and search a global ranking of nearly one million websites.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://rankwebs.xyz/en/">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H4JKLBTSGH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-H4JKLBTSGH');
  </script>
  <script>
    const supported = ["zh", "en"];
    const saved = localStorage.getItem("site-language");
    const browser = (navigator.language || "en").slice(0, 2).toLowerCase();
    const lang = supported.includes(saved) ? saved : supported.includes(browser) ? browser : "en";
    window.setTimeout(() => {
      location.replace(`./${lang}/`);
    }, 800);
  </script>
</head>
<body>
  <p><a href="./en/">Open Global Website Ranking</a></p>
</body>
</html>
